<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Recycling Item Search</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(
    180deg,
    #0b0c10,
    #12131a,
    #181a22,
    #0e0f14
  );
  background-attachment: fixed;
  color: white;
}

/* HEADER */
.site-header {
  position: relative;
  overflow: hidden;
  padding: 40px 0 25px 0;
  text-align: center;
  border-bottom: 2px solid #222;
}

/* Soft glow haze */
.site-header::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0,255,180,0.15), transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
}

/* Canvas */
#particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

.title {
  position: relative;
  z-index: 2;
  font-size: 38px;
  font-weight: 800;
  font-family: 'Orbitron', sans-serif;
}

/* ARC Raiders gradient */
.arc-raiders {
  background: linear-gradient(
    90deg,
    #00c3ff,
    #00ff9d,
    #ffee00,
    #ff2a2a
  );
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradientShift 6s ease infinite;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Loot glow */
.loot-title {
  color: #7cff00;
  text-shadow:
    0 0 5px #7cff00,
    0 0 15px #4cff00,
    0 0 30px #4cff00;
}

/* Subtitle */
.subtitle {
  position: relative;
  z-index: 2;
  margin-top: 12px;
  font-size: 14px;
  line-height: 1.6;
}

.green-glow {
  color: #7cff00;
  text-shadow: 0 0 8px #7cff00;
}

.red-glow {
  color: #ff3b3b;
  text-shadow: 0 0 8px #ff0000;
}

/* SEARCH */
.search-panel {
  padding: 20px;
}

.search-panel input {
  width: 300px;
  padding: 10px;
  font-size: 16px;
  background-color: #1b1c22;
  color: white;
  border: 2px solid #2b2c33;
  border-radius: 6px;
}

/* LIBRARY */
.container {
  height: calc(100vh - 240px);
}

.library {
  width: 100%;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 20px;
  overflow-y: auto;
}

.item img {
  width: 100px;
  height: 100px;
  border-radius: 8px;
  border: 3px solid transparent;
  transition: 0.3s ease;
}

.searched.recyclable img {
  border-color: #00ff88;
  box-shadow: 0 0 15px #00ff88;
}

.searched.not-recyclable img {
  border-color: #ff2a2a;
  box-shadow: 0 0 15px #ff2a2a;
}

.item-name {
  margin-top: 8px;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>

<header class="site-header">
  <canvas id="particles"></canvas>

  <div class="title">
    <span class="loot-title"> Lootgoblins Paradise<br></span>
    <span class="arc-raiders">ARC Raiders</span>
  </div>

  <div class="subtitle">
    Search for an item to check if it can be recycled. If it can, it will be marked with a 
    <span class="green-glow">Green</span> border.<br>
    If an item turns <span class="red-glow">Red</span>, it's best to keep for future quests.
  </div>
</header>

<div class="search-panel">
  <input type="text" id="searchInput" placeholder="Search for an item..." oninput="filterItems()" />
</div>

<div class="container">
  <div class="library" id="library"></div>
</div>

<script>
/* ADVANCED PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let particles = [];
const count = 60;
let mouse = { x: null, y: null };

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resize();
window.addEventListener("resize", resize);

window.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

for (let i = 0; i < count; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    radius: Math.random() * 2 + 1,
    depth: Math.random() * 0.5 + 0.5
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    // Parallax effect
    let dx = 0;
    let dy = 0;

    if (mouse.x && mouse.y) {
      dx = (mouse.x - canvas.width / 2) * 0.0005 * p.depth;
      dy = (mouse.y - canvas.height / 2) * 0.0005 * p.depth;
    }

    p.x += p.vx + dx;
    p.y += p.vy + dy;

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,255,180,0.7)";
    ctx.fill();
  });

  // Connecting lines
  for (let a = 0; a < particles.length; a++) {
    for (let b = a + 1; b < particles.length; b++) {
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 120) {
        ctx.strokeStyle = "rgba(0,255,180," + (1 - dist / 120) * 0.2 + ")";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}
draw();

      { name: "SnitchScanner", image: "SnitchScanner.png", recyclable: false },
    ];

const library = document.getElementById("library");

function renderItems(filtered, searching) {
  library.innerHTML = "";

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "item " + (searching ? (item.recyclable ? "searched recyclable" : "searched not-recyclable") : "");

    div.innerHTML = `
      <img src="${item.image}">
      <div class="item-name">${item.name}</div>
    `;

    library.appendChild(div);
  });
}

function filterItems() {
  const val = document.getElementById("searchInput").value.toLowerCase().trim();
  if (!val) return renderItems(items, false);

  renderItems(
    items.filter(i => i.name.toLowerCase().includes(val)),
    true
  );
}

renderItems(items, false);
</script>

</html>
