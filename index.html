<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recycling Item Search</title>

  <!-- SCI-FI FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #1f1f1f;
    }

    /* HEADER */
    .site-header {
      width: 100%;
      padding: 25px 0 15px 0;
      text-align: center;
      background-color: #1f1f1f;
      border-bottom: 2px solid #2a2a2a;
    }

    .title {
      font-size: 36px;
      font-weight: 800;
      font-family: 'Orbitron', sans-serif;
    }

    /* ARC Raiders Gradient Glow */
    .arc-raiders {
      background: linear-gradient(
        90deg,
        #00c3ff,   /* blue */
        #00ff9d,   /* green */
        #ffee00,   /* yellow */
        #ff2a2a    /* red */
      );
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 6s ease infinite;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Lootgoblins Paradise Green Glow */
    .loot-title {
      color: #7cff00;
      text-shadow:
        0 0 5px #7cff00,
        0 0 10px #7cff00,
        0 0 20px #4cff00;
      animation: glowPulse 2.5s infinite alternate;
    }

    @keyframes glowPulse {
      0% {
        text-shadow:
          0 0 5px #7cff00,
          0 0 10px #7cff00,
          0 0 20px #4cff00;
      }
      100% {
        text-shadow:
          0 0 10px #b6ff4d,
          0 0 20px #7cff00,
          0 0 40px #4cff00;
      }
    }

    /* Subtitle */
    .subtitle {
      margin-top: 12px;
      font-size: 14px;
      color: white;
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }

    .green-glow {
      color: #7cff00;
      text-shadow:
        0 0 5px #7cff00,
        0 0 10px #4cff00,
        0 0 20px #4cff00;
    }

    .red-glow {
      color: #ff3b3b;
      text-shadow:
        0 0 5px #ff3b3b,
        0 0 10px #ff0000,
        0 0 20px #b30000;
    }

    /* SEARCH */
    .search-panel {
      width: 100%;
      padding: 20px 20px 0 20px;
    }

    .search-panel input {
      width: 300px;
      padding: 10px;
      font-size: 16px;
      background-color: #333333;
      color: white;
      border: 3px solid #141414;
      border-radius: 6px;
    }

    .no-results {
      margin-top: 15px;
      color: #db0000;
      font-style: italic;
      display: none;
    }

    /* LIBRARY */
    .container {
      height: calc(100vh - 200px);
    }

    .library {
      width: 100%;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 20px;
      overflow-y: auto;
    }

    .item {
      text-align: center;
    }

    .item img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      border: 3px solid transparent;
      border-radius: 8px;
    }

    .searched.recyclable img {
      border-color: green;
    }

    .searched.not-recyclable img {
      border-color: red;
    }

    .item-name {
      margin-top: 8px;
      font-size: 14px;
      color: white;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="title">
      <span class="arc-raiders">ARC Raiders</span>
      <span class="loot-title"> Lootgoblins Paradise</span>
    </div>

    <div class="subtitle">
      Search for an item to check if it can be recycled. If it can, it will be marked with a 
      <span class="green-glow">Green</span> border.<br>
      If an item turns <span class="red-glow">Red</span>, it's best to keep for future quests.
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-panel">
    <input
      type="text"
      id="searchInput"
      placeholder="Search for an item..."
      oninput="filterItems()"
    />
    <div class="no-results" id="noResults">No item found</div>
  </div>

  <!-- LIBRARY -->
  <div class="container">
    <div class="library" id="library"></div>
  </div>

      { name: "Syringe", image: "Syringe.png", recyclable: false },
      { name: "Wasp Driver", image: "WaspDriver.png", recyclable: false },
      { name: "Water Pump", image: "WaterPump.png", recyclable: false },
      { name: "SnitchScanner", image: "SnitchScanner.png", recyclable: false },
    ];

    const library = document.getElementById("library");
    const noResults = document.getElementById("noResults");

    function renderItems(filteredItems, isSearching) {
      library.innerHTML = "";

      if (filteredItems.length === 0) {
        noResults.style.display = "block";
        return;
      }

      noResults.style.display = "none";

      filteredItems.forEach(item => {
        const div = document.createElement("div");

        let classNames = "item";

        if (isSearching) {
          classNames += " searched ";
          classNames += item.recyclable ? "recyclable" : "not-recyclable";
        }

        div.className = classNames;

        div.innerHTML = `
          <img src="${item.image}" alt="${item.name}">
          <div class="item-name">${item.name}</div>
        `;

        library.appendChild(div);
      });
    }

    function filterItems() {
      const searchValue = document
        .getElementById("searchInput")
        .value
        .toLowerCase()
        .trim();

      if (searchValue === "") {
        renderItems(items, false);
        return;
      }

      const filtered = items.filter(item =>
        item.name.toLowerCase().includes(searchValue)
      );

      renderItems(filtered, true);
    }

    renderItems(items, false);
  </script>
