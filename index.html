<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recycling Item Search</title>

  <!-- SCI-FI FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* HEADER */
    .site-header {
      width: 100%;
      padding: 20px 0;
      text-align: center;
      font-size: 36px;
      font-weight: 800;
      font-family: 'Orbitron', sans-serif;
      color: #7cff00;
      background-color: #1f1f1f;
      border-bottom: 2px solid #2a2a2a;

      /* Glow animation */
      text-shadow:
        0 0 5px #7cff00,
        0 0 10px #7cff00,
        0 0 20px #4cff00;
      animation: glowPulse 2.5s infinite alternate;
    }

    @keyframes glowPulse {
      0% {
        text-shadow:
          0 0 5px #7cff00,
          0 0 10px #7cff00,
          0 0 20px #4cff00;
      }
      100% {
        text-shadow:
          0 0 10px #b6ff4d,
          0 0 20px #7cff00,
          0 0 40px #4cff00;
      }
    }

    .container {
      display: flex;
      height: calc(100vh - 80px);
    }

    /* LEFT SIDE: ITEM LIBRARY */
    .library {
      width: 70%;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 20px;
      background-color: #1f1f1f;
      overflow-y: auto;
    }

    .item {
      text-align: center;
    }

    .item img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      border: 3px solid transparent;
      border-radius: 8px;
    }

    /* BORDER ONLY AFTER SEARCH */
    .searched.recyclable img {
      border-color: green;
    }

    .searched.not-recyclable img {
      border-color: red;
    }

    .item-name {
      margin-top: 8px;
      font-size: 14px;
      color: white
    }

    /* RIGHT SIDE: SEARCH */
    .search-panel {
      width: 30%;
      padding: 20px;
      border-left: 2px solid #1f1f1f;
      background-color: #1f1f1f
    }

    .search-panel input {
      background-color: #333333;
      color: white;
      border: 3px solid #141414;
    }

    .no-results {
      margin-top: 20px;
      color: #db0000;
      font-style: italic;
      display: none;
    }
  </style>
</head>

<body>

        type="text"

      { name: "SnitchScanner", image: "SnitchScanner.png", recyclable: false },
    ];

    const library = document.getElementById("library");
    const noResults = document.getElementById("noResults");

    function renderItems(filteredItems, isSearching) {
      library.innerHTML = "";

      if (filteredItems.length === 0) {
        noResults.style.display = "block";
        return;
      }

      noResults.style.display = "none";

      filteredItems.forEach(item => {
        const div = document.createElement("div");

        let classNames = "item";

        if (isSearching) {
          classNames += " searched ";
          classNames += item.recyclable ? "recyclable" : "not-recyclable";
        }

        div.className = classNames;

        div.innerHTML = `
          <img src="${item.image}" alt="${item.name}">
          <div class="item-name">${item.name}</div>
        `;

        library.appendChild(div);
      });
    }

    function filterItems() {
      const searchValue = document
        .getElementById("searchInput")
        .value
        .toLowerCase()
        .trim();

    if (searchValue === "") {
        renderItems(items, false);
        return;
      }

      const filtered = items.filter(item =>
        item.name.toLowerCase().includes(searchValue)
      );

      renderItems(filtered, true);
    }

    // INITIAL LOAD
    renderItems(items, false);
  </script>
